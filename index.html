<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tailor Pro Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;margin:0;}
input,button{padding:10px;margin:5px;border-radius:6px;border:none;}
button{background:#22c55e;color:white;cursor:pointer;}
.table{width:100%;border-collapse:collapse;}
td,th{padding:6px;border-bottom:1px solid #444;}
#adminPanel,#clientPanel,#clientForm,#measureForm{display:none;}
input{width:95%;}
#searchInput{font-size:18px;width:98%;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPanel">
<h2>Admin Login</h2>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">
<input id="shopId" placeholder="Shop ID">
<input id="shopNameInput" placeholder="Shop Name">
<input id="shopPhoneInput" placeholder="Phone">
<input id="shopAddressInput" placeholder="Address">
<button onclick="saveShop()">Save Shop</button>
<table class="table">
<thead><tr><th>ID</th><th>Name</th><th>Total</th><th>Link</th><th>Action</th></tr></thead>
<tbody id="shopTable"></tbody>
</table>
</div>

<!-- SHOP -->
<div id="clientPanel">

<h2 id="shopName"></h2>
<p id="shopPhone"></p>
<p id="shopAddress"></p>
<h3 id="totalClients"></h3>

<button onclick="showForm()">➕ Add Client</button>
<button onclick="importData()">📥 Import</button>
<button onclick="exportData()">📤 Export</button>

<input id="searchInput" placeholder="Search...">

<div id="clientForm">
<input id="nameInput" placeholder="Name">
<input id="mobileInput" placeholder="Mobile">
<input id="serialInput" placeholder="Book No">
<input type="file" id="imageInput">
<button onclick="saveClient()">Save</button>
</div>

<!-- MEASURE FORM -->
<div id="measureForm"></div>

<table class="table">
<thead>
<tr><th>Name</th><th>Phone</th><th>Book</th><th>Action</th></tr>
</thead>
<tbody id="clientTable"></tbody>
</table>

</div>

<script>

// FIREBASE
firebase.initializeApp({
 apiKey:"AIzaSyAoChlrCKNFO0JvJYnPAx7d8zAd9zXiJuI",
 authDomain:"tailor-pro-new-9e723.firebaseapp.com",
 projectId:"tailor-pro-new-9e723"
});

let db=firebase.firestore();
let currentShop="";
let editClientId=null;
let adminPass="admin123";

/* LOGIN */
function login(){
 if(pass.value===adminPass){
  loginPanel.style.display="none";
  adminPanel.style.display="block";
  loadShops();
 }
}

/* SHOP */
async function saveShop(){
 await db.collection("shops").add({
  id:shopId.value,
  name:shopNameInput.value,
  phone:shopPhoneInput.value,
  address:shopAddressInput.value
 });
 loadShops();
}

async function loadShops(){
 let snap=await db.collection("shops").get();
 let html="";
 for(let d of snap.docs){
  let s=d.data();
  let c=await db.collection("clients").where("shop","==",s.id).get();
  let link=location.origin+location.pathname+"?shop="+s.id;

  html+=`<tr>
  <td>${s.id}</td>
  <td>${s.name}</td>
  <td>${c.size}</td>
  <td><a href="${link}" target="_blank">Open</a></td>
  <td></td></tr>`;
 }
 shopTable.innerHTML=html;
}

/* OPEN SHOP */
let p=new URLSearchParams(location.search);
if(p.get("shop")){
 loginPanel.style.display="none";
 openShop(p.get("shop"));
}

async function openShop(id){
 let snap=await db.collection("shops").where("id","==",id).get();
 snap.forEach(d=>{
  let s=d.data();
  currentShop=s.id;
  clientPanel.style.display="block";
  shopName.innerText=s.name;
  shopPhone.innerText=s.phone;
  shopAddress.innerText=s.address;
  loadClients();
 });
}

/* IMAGE */
async function uploadImage(file){
 let fd=new FormData();
 fd.append("file",file);
 fd.append("upload_preset","unsigned_preset");
 let r=await fetch("https://api.cloudinary.com/v1_1/da1m4wmdb/image/upload",{method:"POST",body:fd});
 let d=await r.json();
 return d.secure_url;
}

/* SAVE CLIENT */
async function saveClient(){
 let img="";
 if(imageInput.files[0]) img=await uploadImage(imageInput.files[0]);

 let obj={
  shop:currentShop,
  name:nameInput.value,
  mobile:mobileInput.value,
  serial:serialInput.value,
  image:img,
  measure:{}
 };

 if(editClientId){
  await db.collection("clients").doc(editClientId).update(obj);
 }else{
  await db.collection("clients").add(obj);
 }

 clientForm.style.display="none";
 loadClients();
}

/* LOAD CLIENT */
async function loadClients(){
 let snap=await db.collection("clients").where("shop","==",currentShop).get();
 let arr=[];
 snap.forEach(d=>arr.push({...d.data(),id:d.id}));

 totalClients.innerText="Total: "+arr.length;
 render(arr.slice(-10).reverse());
}

/* RENDER */
function render(arr){
 let html="";
 arr.forEach(r=>{
 html+=`<tr>
 <td>${r.name}</td>
 <td>${r.mobile}</td>
 <td>${r.serial}</td>
 <td>
 <button onclick='editClient(${JSON.stringify(r)})'>✏️</button>
 <button onclick='openMeasure("${r.id}")'>📏</button>
 <button onclick='printSlip(${JSON.stringify(r)})'>🖨️</button>
 <button onclick='whatsappShare(${JSON.stringify(r)})'>📲</button>
 </td>
 </tr>`;
 });
 clientTable.innerHTML=html;
}

/* MEASURE FORM */
function openMeasure(id){
 editClientId=id;
 let fields=[
 "Length","Chest","Waist","Shoulder","Collar","Seat","Sleeve Length","Sleeve Round",
 "Cuff","Arm Hole","Hip","Bottom","Thigh","Knee","Pant Length","Inseam",
 "Front Rise","Back Rise","Pocket","Belt","Fitting","Style","Notes","Extra1","Extra2"
 ];

 let html="";
 fields.forEach(f=>{
  html+=`<input placeholder="${f}" id="m_${f}">`;
 });

 html+=`<button onclick="saveMeasure()">Save Measurement</button>`;
 measureForm.innerHTML=html;
 measureForm.style.display="block";
}

/* SAVE MEASURE */
async function saveMeasure(){
 let data={};
 document.querySelectorAll("#measureForm input").forEach(i=>{
  data[i.id]=i.value;
 });

 await db.collection("clients").doc(editClientId).update({measure:data});
 alert("Saved");
 measureForm.style.display="none";
}

/* SEARCH */
searchInput.oninput=async function(){
 let v=this.value.toLowerCase();
 let snap=await db.collection("clients").where("shop","==",currentShop).get();
 let arr=[];
 snap.forEach(d=>{
  let r={...d.data(),id:d.id};
  if(r.name.toLowerCase().includes(v)||r.mobile.includes(v)||r.serial.includes(v)){
   arr.push(r);
  }
 });
 render(arr);
};

/* PRINT */
function printSlip(r){
 let w=window.open("");
 w.document.write(`<html><body onload="window.print()">
 <h2>${shopName.innerText}</h2>
 <p>${r.name} - ${r.mobile}</p>
 </body></html>`);
}

/* IMPORT */
function importData(){
 let i=document.createElement("input");
 i.type="file";
 i.onchange=async e=>{
  let file=e.target.files[0];
  let text=await file.text();
  let data=JSON.parse(text);
  data.forEach(async d=>{
   await db.collection("clients").add({...d,shop:currentShop});
  });
  loadClients();
 };
 i.click();
}

/* EXPORT */
async function exportData(){
 let snap=await db.collection("clients").where("shop","==",currentShop).get();
 let arr=[];
 snap.forEach(d=>arr.push(d.data()));
 let blob=new Blob([JSON.stringify(arr)],{type:"application/json"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="backup.json";
 a.click();
}

/* WHATSAPP */
function whatsappShare(r){
 let text=`Name: ${r.name} Phone: ${r.mobile}`;
 window.open("https://wa.me/?text="+encodeURIComponent(text));
}

/* EDIT */
function editClient(r){
 showForm();
 nameInput.value=r.name;
 mobileInput.value=r.mobile;
 serialInput.value=r.serial;
 editClientId=r.id;
}

function showForm(){
 clientForm.style.display="block";
}

</script>

</body>
</html>
