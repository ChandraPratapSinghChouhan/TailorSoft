<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tailor Pro Final Fix</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;margin:0;}
input,button{padding:10px;margin:5px;border-radius:6px;border:none;}
button{background:#22c55e;color:white;cursor:pointer;}
.table{width:100%;border-collapse:collapse;}
td,th{padding:6px;border-bottom:1px solid #444;}
#adminPanel,#clientPanel,#clientForm{display:none;}
input{width:95%;}
#searchInput{font-size:18px;width:98%;}
</style>
</head>

<body>

<div id="loginPanel">
<h2>Admin Login</h2>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel">
<h3>Admin Panel</h3>

<button onclick="changePassword()">Change Password</button><br>

<input id="shopId" placeholder="Shop ID">
<input id="shopNameInput" placeholder="Shop Name">
<input id="shopPhoneInput" placeholder="Phone">
<input id="shopAddressInput" placeholder="Address">

<button onclick="saveShop()">Save Shop</button>

<table class="table">
<thead>
<tr><th>ID</th><th>Name</th><th>Total</th><th>Action</th></tr>
</thead>
<tbody id="shopTable"></tbody>
</table>
</div>

<div id="clientPanel">

<h2 id="shopName"></h2>
<p id="shopPhone"></p>
<p id="shopAddress"></p>
<h3 id="totalClients"></h3>

<button onclick="showForm()">➕ Add Client</button>
<button onclick="importData()">📥 Import</button>
<button onclick="exportData()">📤 Export</button>

<input id="searchInput" placeholder="Search...">

<div id="clientForm">
<input id="nameInput" placeholder="Name">
<input id="mobileInput" placeholder="Mobile">
<input id="serialInput" placeholder="Book No">
<input type="file" id="imageInput">
<button onclick="saveClient()">Save</button>
</div>

<table class="table">
<thead>
<tr><th>Name</th><th>Phone</th><th>Book</th><th>Action</th></tr>
</thead>
<tbody id="clientTable"></tbody>
</table>

</div>

<script>

firebase.initializeApp({
 apiKey:"AIzaSyAoChlrCKNFO0JvJYnPAx7d8zAd9zXiJuI",
 authDomain:"tailor-pro-new-9e723.firebaseapp.com",
 projectId:"tailor-pro-new-9e723"
});

let db=firebase.firestore();
let currentShop="";
let editClientId=null;
let adminPass="admin123";

/* LOGIN */
function login(){
 if(pass.value===adminPass){
  loginPanel.style.display="none";
  adminPanel.style.display="block";
  loadShops();
 }else alert("Wrong Password");
}

/* PASSWORD */
function changePassword(){
 let p=prompt("Enter New Password");
 if(p){adminPass=p;alert("Updated");}
}

/* SAVE SHOP */
async function saveShop(){
 let data={
  id:shopId.value,
  name:shopNameInput.value,
  phone:shopPhoneInput.value,
  address:shopAddressInput.value
 };

 if(window.editShopId){
  await db.collection("shops").doc(window.editShopId).update(data);
  window.editShopId=null;
 }else{
  await db.collection("shops").add(data);
 }

 loadShops();
}

/* LOAD SHOPS */
async function loadShops(){
 let snap=await db.collection("shops").get();
 let html="";

 for(let d of snap.docs){
  let s=d.data();
  let c=await db.collection("clients").where("shop","==",s.id).get();
  let link=location.origin+location.pathname+"?shop="+s.id;

  html+=`<tr>
  <td>${s.id}</td>
  <td>${s.name}</td>
  <td>${c.size}</td>
  <td>
   <a href="${link}" target="_blank">Open</a>
   <button onclick='editShop("${d.id}",${JSON.stringify(s)})'>✏️</button>
   <button onclick='deleteShop("${d.id}")'>🗑️</button>
  </td>
  </tr>`;
 }

 shopTable.innerHTML=html;
}

/* EDIT SHOP */
function editShop(id,s){
 shopId.value=s.id;
 shopNameInput.value=s.name;
 shopPhoneInput.value=s.phone;
 shopAddressInput.value=s.address;
 window.editShopId=id;
}

/* DELETE SHOP */
async function deleteShop(id){
 if(confirm("Delete shop?")){
  await db.collection("shops").doc(id).delete();
  loadShops();
 }
}

/* OPEN SHOP */
let p=new URLSearchParams(location.search);
if(p.get("shop")){
 loginPanel.style.display="none";
 openShop(p.get("shop"));
}

async function openShop(id){
 let snap=await db.collection("shops").where("id","==",id).get();
 snap.forEach(d=>{
  let s=d.data();
  currentShop=s.id;
  clientPanel.style.display="block";
  shopName.innerText=s.name;
  shopPhone.innerText=s.phone;
  shopAddress.innerText=s.address;
  loadClients();
 });
}

/* IMAGE */
async function uploadImage(file){
 let fd=new FormData();
 fd.append("file",file);
 fd.append("upload_preset","unsigned_preset");
 let r=await fetch("https://api.cloudinary.com/v1_1/da1m4wmdb/image/upload",{method:"POST",body:fd});
 let d=await r.json();
 return d.secure_url;
}

/* SAVE CLIENT */
async function saveClient(){
 let img="";
 if(imageInput.files[0]) img=await uploadImage(imageInput.files[0]);

 let obj={
  shop:currentShop,
  name:nameInput.value,
  mobile:mobileInput.value,
  serial:serialInput.value,
  image:img
 };

 if(editClientId){
  await db.collection("clients").doc(editClientId).update(obj);
 }else{
  await db.collection("clients").add(obj);
 }

 clientForm.style.display="none";
 loadClients();
}

/* LOAD CLIENTS */
async function loadClients(){
 let snap=await db.collection("clients").where("shop","==",currentShop).get();
 let arr=[];
 snap.forEach(d=>arr.push({...d.data(),id:d.id}));

 totalClients.innerText="Total: "+arr.length;
 render(arr.slice(-10).reverse());
}

/* RENDER */
function render(arr){
 let html="";
 arr.forEach(r=>{
 html+=`<tr>
 <td>${r.name}</td>
 <td>${r.mobile}</td>
 <td>${r.serial}</td>
 <td>
 <button onclick='editClient(${JSON.stringify(r)})'>✏️</button>
 <button onclick='printSlip(${JSON.stringify(r)})'>🖨️</button>
 </td>
 </tr>`;
 });
 clientTable.innerHTML=html;
}

/* PRINT */
function printSlip(r){
 let w = window.open("", "_blank");

 let html = `
 <html>
 <head>
 <title>Print</title>
 <style>
 @page{size:A4;margin:0;}
 body{margin:0;font-family:Arial;}
 .box{
  width:210mm;
  height:297mm;
  padding:10mm;
  box-sizing:border-box;
  text-align:center;
 }
 img{
  width:100%;
  height:140mm;
  object-fit:contain;
 }
 </style>
 </head>

 <body>
 <div class="box">
 <h2>${shopName.innerText}</h2>
 <p>${shopPhone.innerText}</p>
 <p>${shopAddress.innerText}</p>
 <hr>
 <h3>${r.name}</h3>
 <p>${r.mobile}</p>
 <p>Book No: ${r.serial}</p>
 ${r.image ? `<img src="${r.image}">` : ""}
 </div>

 <script>
 window.onload = function(){
   setTimeout(function(){
     window.print();
   }, 500);
 }
 <\/script>

 </body>
 </html>
 `;

 w.document.open();
 w.document.write(html);
 w.document.close();
}

/* SEARCH */
searchInput.oninput=async function(){
 let v=this.value.toLowerCase();
 let snap=await db.collection("clients").where("shop","==",currentShop).get();
 let arr=[];
 snap.forEach(d=>{
  let r={...d.data(),id:d.id};
  if(r.name.toLowerCase().includes(v)||r.mobile.includes(v)||r.serial.includes(v)){
   arr.push(r);
  }
 });
 render(arr);
};

/* EDIT CLIENT */
function editClient(r){
 showForm();
 nameInput.value=r.name;
 mobileInput.value=r.mobile;
 serialInput.value=r.serial;
 editClientId=r.id;
}

function showForm(){
 clientForm.style.display="block";
}

/* EXPORT */
async function exportData(){
 let snap=await db.collection("clients").where("shop","==",currentShop).get();
 let data=[];
 snap.forEach(d=>data.push(d.data()));

 let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="clients.json";
 a.click();
}

/* IMPORT */
function importData(){
 let input=document.createElement("input");
 input.type="file";
 input.accept="application/json";

 input.onchange=async e=>{
  let file=e.target.files[0];
  let text=await file.text();
  let data=JSON.parse(text);

  for(let d of data){
   await db.collection("clients").add({...d,shop:currentShop});
  }

  alert("Import Done ✅");
  loadClients();
 };

 input.click();
}

</script>
</body>
</html>
