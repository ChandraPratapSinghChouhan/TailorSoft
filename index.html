<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tailor Pro Final</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;}
input,button{padding:10px;margin:5px;border-radius:6px;border:none;}
button{background:#22c55e;color:white;cursor:pointer;}
.table{width:100%;border-collapse:collapse;}
td,th{padding:6px;border-bottom:1px solid #444;}
#adminPanel,#clientPanel{display:none;}
input{width:95%;}
#searchInput{font-size:18px;width:98%;}
</style>
</head>

<body>

<h2>Tailor PRO FINAL</h2>

<!-- LOGIN -->
<div id="loginPanel">
<input id="pass" placeholder="Admin Password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">

<h3>Admin Panel</h3>
<button onclick="changePassword()">Change Password</button><br>

<input id="shopId" placeholder="Shop ID">
<input id="shopNameInput" placeholder="Shop Name">
<input id="shopPhoneInput" placeholder="Phone">
<input id="shopAddressInput" placeholder="Address">

<button onclick="saveShop()">Save Shop</button>

<table class="table">
<thead>
<tr>
<th>ID</th><th>Name</th><th>Phone</th>
<th>Total</th><th>Link</th><th>Action</th>
</tr>
</thead>
<tbody id="shopTable"></tbody>
</table>

</div>

<!-- CLIENT -->
<div id="clientPanel">

<h2 id="shopName"></h2>
<p id="shopPhone"></p>
<p id="shopAddress"></p>
<h3 id="totalClients"></h3>

<input id="searchInput" placeholder="Search Name / Phone / Book">

<input id="nameInput" placeholder="Client Name">
<input id="mobileInput" placeholder="Mobile">
<input id="serialInput" placeholder="Book No">
<input type="file" id="imageInput">

<button onclick="saveClient()">Save Client</button>

<table class="table">
<thead>
<tr>
<th>Name</th><th>Phone</th><th>Book</th><th>Image</th><th>Action</th>
</tr>
</thead>
<tbody id="clientTable"></tbody>
</table>

</div>

<script>

// FIREBASE
firebase.initializeApp({
  apiKey: "AIzaSyAoChlrCKNFO0JvJYnPAx7d8zAd9zXiJuI",
  authDomain: "tailor-pro-new-9e723.firebaseapp.com",
  projectId: "tailor-pro-new-9e723"
});

let db=firebase.firestore();
let currentShop="";
let editShopId=null;
let editClientId=null;
let adminPass="admin123";

/* LOGIN */
function login(){
 if(pass.value===adminPass){
  loginPanel.style.display="none";
  adminPanel.style.display="block";
  loadShops();
 }else alert("Wrong Password");
}

/* CHANGE PASSWORD */
function changePassword(){
 let p=prompt("New Password");
 if(p){adminPass=p;alert("Updated");}
}

/* SAVE SHOP */
async function saveShop(){
 if(editShopId){
  let snap=await db.collection("shops").where("id","==",editShopId).get();
  snap.forEach(d=>db.collection("shops").doc(d.id).update({
   id:shopId.value,
   name:shopNameInput.value,
   phone:shopPhoneInput.value,
   address:shopAddressInput.value
  }));
  editShopId=null;
 }else{
  await db.collection("shops").add({
   id:shopId.value,
   name:shopNameInput.value,
   phone:shopPhoneInput.value,
   address:shopAddressInput.value
  });
 }
 alert("Saved");
 loadShops();
}

/* EDIT SHOP */
async function editShop(id){
 let snap=await db.collection("shops").where("id","==",id).get();
 snap.forEach(d=>{
  let s=d.data();
  shopId.value=s.id;
  shopNameInput.value=s.name;
  shopPhoneInput.value=s.phone;
  shopAddressInput.value=s.address;
  editShopId=id;
 });
}

/* DELETE SHOP */
async function deleteShop(id){
 let snap=await db.collection("shops").where("id","==",id).get();
 snap.forEach(d=>db.collection("shops").doc(d.id).delete());
 loadShops();
}

/* LOAD SHOPS */
async function loadShops(){
 let snap=await db.collection("shops").get();
 let html="";
 for(let d of snap.docs){
  let s=d.data();
  let c=await db.collection("clients").where("shop","==",s.id).get();

  let link=location.origin+location.pathname+"?shop="+s.id;

  html+=`<tr>
  <td>${s.id}</td>
  <td>${s.name}</td>
  <td>${s.phone}</td>
  <td>${c.size}</td>
  <td><a href="${link}" target="_blank">Open</a></td>
  <td>
   <button onclick="editShop('${s.id}')">✏️</button>
   <button onclick="deleteShop('${s.id}')">🗑️</button>
  </td>
  </tr>`;
 }
 shopTable.innerHTML=html;
}

/* AUTO SHOP */
let params=new URLSearchParams(location.search);
if(params.get("shop")){
 loginPanel.style.display="none";
 openShopDirect(params.get("shop"));
}

async function openShopDirect(id){
 let snap=await db.collection("shops").where("id","==",id).get();
 snap.forEach(d=>openShop(d.data()));
}

function openShop(s){
 currentShop=s.id;
 adminPanel.style.display="none";
 clientPanel.style.display="block";
 shopName.innerText=s.name;
 shopPhone.innerText=s.phone;
 shopAddress.innerText=s.address;
 loadClients();
}

/* IMAGE UPLOAD */
async function uploadImage(file){
 let fd=new FormData();
 fd.append("file",file);
 fd.append("upload_preset","unsigned_preset");
 let res=await fetch("https://api.cloudinary.com/v1_1/da1m4wmdb/image/upload",{method:"POST",body:fd});
 let data=await res.json();
 return data.secure_url;
}

/* SAVE CLIENT */
async function saveClient(){
 alert("Saving...");
 let img="";
 if(imageInput.files[0]){
  img=await uploadImage(imageInput.files[0]);
 }

 let obj={
  shop:currentShop,
  name:nameInput.value,
  mobile:mobileInput.value,
  serial:serialInput.value,
  image:img
 };

 if(editClientId){
  await db.collection("clients").doc(editClientId).update(obj);
  editClientId=null;
 }else{
  await db.collection("clients").add(obj);
 }

 alert("Saved ✅");
 loadClients();
}

/* LOAD CLIENT */
async function loadClients(){
 let snap=await db.collection("clients").where("shop","==",currentShop).get();

 let arr=[];
 snap.forEach(d=>arr.push({...d.data(),id:d.id}));

 totalClients.innerText="Total Clients: "+arr.length;

 arr=arr.slice(-10).reverse();
 renderClients(arr);
}

/* RENDER */
function renderClients(arr){
 let html="";
 arr.forEach(r=>{
 html+=`<tr>
 <td>${r.name}</td>
 <td>${r.mobile}</td>
 <td>${r.serial}</td>
 <td>${r.image?`<img src="${r.image}" width="40">`:""}</td>
 <td>
  <button onclick='editClient(${JSON.stringify(r)})'>✏️</button>
  <button onclick="deleteClient('${r.id}')">🗑️</button>
  <button onclick='printSlip(${JSON.stringify(r)})'>🖨️</button>
 </td>
 </tr>`;
 });
 clientTable.innerHTML=html;
}

/* SEARCH */
searchInput.oninput=async function(){
 let v=this.value.toLowerCase();
 let snap=await db.collection("clients").where("shop","==",currentShop).get();

 let arr=[];
 snap.forEach(d=>{
  let r={...d.data(),id:d.id};
  if(r.name.toLowerCase().includes(v)||r.mobile.includes(v)||r.serial.includes(v)){
   arr.push(r);
  }
 });

 renderClients(arr);
};

/* DELETE CLIENT */
async function deleteClient(id){
 await db.collection("clients").doc(id).delete();
 loadClients();
}

/* EDIT CLIENT */
function editClient(r){
 nameInput.value=r.name;
 mobileInput.value=r.mobile;
 serialInput.value=r.serial;
 editClientId=r.id;
}

/* PRINT */
/* PERFECT ONE PAGE PRINT */
function printSlip(r){

let w = window.open("");

w.document.write(`
<html>
<head>
<title>Print</title>

<style>
@page {
 size: A4;
 margin: 0;
}

body{
 margin:0;
 font-family:Arial;
}

.container{
 width:210mm;
 height:297mm;
 padding:10mm;
 box-sizing:border-box;
 overflow:hidden; /* 🔥 prevents 2nd page */
 text-align:center;
}

h2{margin:5px;}
p{margin:3px;}

img{
 width:100%;
 height:150mm; /* 🔥 FIXED HEIGHT */
 object-fit:contain;
}

hr{margin:5px 0;}

</style>

</head>

<body onload="window.print()">

<div class="container">

<h2>${shopName.innerText}</h2>
<p>${shopPhone.innerText}</p>
<p>${shopAddress.innerText}</p>

<hr>

<h3>${r.name}</h3>
<p>${r.mobile}</p>
<p>Book No: ${r.serial}</p>

${r.image ? `<img src="${r.image}">` : ""}

</div>

</body>
</html>
`);

w.document.close();
}
 <html>
 <head>
 <style>
 body{font-family:Arial;text-align:center;margin:0;}
 .box{width:794px;height:1123px;padding:20px;}
 img{width:100%;height:800px;object-fit:contain;}
 </style>
 </head>

 <body onload="window.print()">

 <div class="box">
 <h2>${shopName.innerText}</h2>
 <p>${shopPhone.innerText}</p>
 <p>${shopAddress.innerText}</p>

 <hr>

 <h3>${r.name}</h3>
 <p>${r.mobile}</p>
 <p>Book: ${r.serial}</p>

 ${r.image?`<img src="${r.image}">`:""}

 </div>

 </body>
 </html>
 `);

 w.document.close();
}

</script>

</body>
</html>
