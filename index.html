<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tailor Pro Final Fix</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;margin:0;}
input,button{padding:10px;margin:5px;border-radius:6px;border:none;}
button{background:#22c55e;color:white;cursor:pointer;}
.table{width:100%;border-collapse:collapse;}
td,th{padding:6px;border-bottom:1px solid #444;}
#adminPanel,#clientPanel,#clientForm,#measureForm{display:none;}
input{width:95%;}
#searchInput{font-size:18px;width:98%;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPanel">
<h2>Admin Login</h2>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">
<h3>Admin Panel</h3>

<input id="shopId" placeholder="Shop ID">
<input id="shopNameInput" placeholder="Shop Name">
<input id="shopPhoneInput" placeholder="Phone">
<input id="shopAddressInput" placeholder="Address">

<button onclick="addShop()">Add Shop</button>
<button onclick="changePassword()">Change Password</button>

<table class="table">
<thead>
<tr>
<th>ID</th><th>Name</th><th>Phone</th><th>Address</th><th>Link</th><th>Clients</th><th>Action</th>
</tr>
</thead>
<tbody id="shopTable"></tbody>
</table>

</div>

<!-- SHOP -->
<div id="clientPanel">
<h2 id="shopName"></h2>
<p id="shopPhone"></p>
<p id="shopAddress"></p>
<p>Total Clients: <span id="totalClients">0</span></p>

<button onclick="showForm()">Add Client</button>
<button onclick="importData()">Import</button>
<button onclick="exportData()">Export</button>

<input id="searchInput" placeholder="Search...">

<table class="table">
<tbody id="clientTable"></tbody>
</table>
</div>

<!-- FORM -->
<div id="clientForm">
<input id="nameInput" placeholder="Name">
<input id="mobileInput" placeholder="Phone">
<input id="serialInput" placeholder="Book No">
<input type="file" id="imageInput">

<button onclick="saveClient()">Save</button>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAoChlrCKNFO0JvJYnPAx7d8zAd9zXiJuI",
  authDomain: "tailor-pro-new-9e723.firebaseapp.com",
  projectId: "tailor-pro-new-9e723"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* LOGIN */
let adminPass="admin123";
function login(){
 if(pass.value===adminPass){
  loginPanel.style.display="none";
  adminPanel.style.display="block";
  loadShops();
 } else alert("Wrong");
}

function changePassword(){
 let p=prompt("New Password");
 if(p){adminPass=p;alert("Changed");}
}

/* SHOP */
async function addShop(){
 await db.collection("shops").doc(shopId.value).set({
  name:shopNameInput.value,
  phone:shopPhoneInput.value,
  address:shopAddressInput.value
 });
 loadShops();
}

async function loadShops(){
 let snap=await db.collection("shops").get();
 shopTable.innerHTML="";
 snap.forEach(d=>{
  let s=d.data();
  shopTable.innerHTML+=`
<tr>
<td>${d.id}</td>
<td>${s.name}</td>
<td>${s.phone}</td>
<td>${s.address}</td>
<td><a href="?shop=${d.id}" target="_blank">Open</a></td>
<td>0</td>
<td><button onclick="delShop('${d.id}')">Delete</button></td>
</tr>`;
 });
}

function delShop(id){
 db.collection("shops").doc(id).delete();
 loadShops();
}

/* SHOP LOAD */
let currentShop=null;

let url=new URLSearchParams(location.search);
if(url.get("shop")){
 currentShop=url.get("shop");
 openShop();
}

async function openShop(){
 loginPanel.style.display="none";
 adminPanel.style.display="none";
 clientPanel.style.display="block";

 let s=await db.collection("shops").doc(currentShop).get();
 s=s.data();

 shopName.innerText=s.name;
 shopPhone.innerText=s.phone;
 shopAddress.innerText=s.address;

 loadClients();
}

/* CLIENT */
function showForm(){
 clientForm.style.display="block";
}

async function saveClient(){
 alert("Please wait...");
 let file=imageInput.files[0];
 let img="";

 if(file){
  let formData=new FormData();
  formData.append("image",file);
  let res=await fetch("https://api.imgbb.com/1/upload?key=da1m4wmdb",{method:"POST",body:formData});
  let data=await res.json();
  img=data.data.url;
 }

 await db.collection("clients").add({
  shop:currentShop,
  name:nameInput.value,
  mobile:mobileInput.value,
  serial:serialInput.value,
  image:img
 });

 alert("Saved ✅");
 loadClients();
}

/* LOAD CLIENT */
async function loadClients(){
 let snap=await db.collection("clients").where("shop","==",currentShop).get();
 let arr=[];
 snap.forEach(d=>arr.push(d.data()));

 totalClients.innerText=arr.length;

 arr=arr.slice(-10).reverse();

 clientTable.innerHTML="";
 arr.forEach(r=>{
  clientTable.innerHTML+=`
<tr>
<td>${r.name}</td>
<td>${r.mobile}</td>
<td>${r.serial}</td>
<td><img src="${r.image}" width="50"></td>
<td><button onclick='printSlip(${JSON.stringify(r)})'>Print</button></td>
</tr>`;
 });
}

/* PRINT */
function printSlip(r){
 let w=window.open();
 w.document.write(`
 <style>
 body{margin:0;font-family:Arial;text-align:center;}
 .page{width:210mm;height:297mm;overflow:hidden;padding:10mm;}
 img{width:100%;height:150mm;object-fit:contain;}
 </style>
 <div class="page">
 <h2>${shopName.innerText}</h2>
 <p>${shopPhone.innerText}</p>
 <p>${shopAddress.innerText}</p>
 <hr>
 <h3>${r.name}</h3>
 <p>${r.mobile}</p>
 <p>${r.serial}</p>
 <img src="${r.image}">
 </div>
 `);
 w.print();
}

/* ========================= */
/* ✅ FINAL IMPORT / EXPORT FIX */
/* ========================= */

async function exportData(){
 try{
  let snap = await db.collection("clients")
    .where("shop","==",currentShop).get();

  let arr=[];
  snap.forEach(doc=>arr.push(doc.data()));

  let blob = new Blob(
    [JSON.stringify(arr,null,2)],
    {type:"application/json"}
  );

  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="backup_"+currentShop+".json";
  a.click();

  alert("Export Done ✅");

 }catch(e){
  alert("Export Error");
 }
}

function importData(){

 let input=document.createElement("input");
 input.type="file";
 input.accept=".json";

 input.onchange=async(e)=>{
  try{
   let file=e.target.files[0];
   let text=await file.text();
   let data=JSON.parse(text);

   alert("Please wait...");

   for(let d of data){
    await db.collection("clients").add({
     ...d,
     shop:currentShop
    });
   }

   alert("Import Done ✅");
   loadClients();

  }catch{
   alert("Import Error");
  }
 };

 input.click();
}

</script>

</body>
</html>
